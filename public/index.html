<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UA-CIT Office Feedback Survey Backend</title>
    <link rel="icon" type="image/png" href="cit-logo.png?v=2">
    <style>
        /* Synced with Premium UA & CIT Color Palette */
        :root {
            --ua-blue: #004785;         
            --ua-blue-hover: #003366;   
            --cit-grey: #8a9aa9;        
            --cit-grey-light: #e2e8f0;  
            --bg-color: #f4f7f9;        
            --card-bg: #ffffff;         
            --status-green: #10b981;
        }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif; 
            background-color: var(--bg-color);
            color: #334155;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        /* Adjusted Header for Side-by-Side Layout */
        .portal-header {
            display: flex;
            align-items: center;      
            justify-content: center;  
            gap: 25px;                
            margin-top: 20px;
            margin-bottom: 40px; 
            padding-bottom: 25px; 
            border-bottom: 1px solid var(--cit-grey-light);
            width: 100%;
            max-width: 900px;
        }
        
        .header-titles {
            text-align: left;         
        }

        .portal-header h1 { 
            color: var(--ua-blue); 
            margin: 0 0 4px 0; 
            font-size: 2.2em; 
            font-weight: 800;
            letter-spacing: -0.5px;
        }
        
        .portal-header h2 { 
            color: var(--cit-grey); 
            margin: 0; 
            font-size: 1.15em; 
            font-weight: 500; 
        }

        .ua-logo {
            width: 105px;            
            height: auto;
            margin: 0;            
            border-radius: 50%; 
            mix-blend-mode: multiply; 
            filter: drop-shadow(0 4px 8px rgba(0, 71, 133, 0.1)); 
            flex-shrink: 0;           
        }

        /* Gateway Card */
        .gateway-card {
            background: var(--card-bg);
            padding: 50px 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 71, 133, 0.08); 
            border-top: 6px solid var(--ua-blue);
            text-align: center;
            max-width: 450px;
            width: 100%;
            margin-top: 2vh; 
        }

        .logo-placeholder {
            font-size: 3em;
            margin-bottom: 10px;
        }

        .gateway-card h3 {
            color: var(--ua-blue);
            margin: 0 0 10px 0;
            font-size: 1.6em;
            font-weight: 800;
        }

        p {
            color: #64748b;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        /* Pulsing Status Dot */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #ecfdf5;
            color: #047857;
            padding: 8px 16px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.9em;
            margin-bottom: 30px;
            border: 1px solid #a7f3d0;
        }

        .pulse-dot {
            width: 10px;
            height: 10px;
            background-color: var(--status-green);
            border-radius: 50%;
            box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 8px rgba(16, 185, 129, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        .btn-portal {
            display: inline-block;
            background: var(--ua-blue);
            color: white;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.2s ease;
            width: 80%;
            box-sizing: border-box;
            box-shadow: 0 4px 6px rgba(0, 71, 133, 0.2);
        }

        .btn-portal:hover {
            background: var(--ua-blue-hover);
            box-shadow: 0 6px 12px rgba(0, 71, 133, 0.3);
        }

        .btn-portal:active {
            transform: scale(0.97);
        }
    </style>
</head>
<body>

    <div class="portal-header">
        <img src="ua-logo.png" alt="University of the Assumption Logo" class="ua-logo">
        <div class="header-titles">
            <h1>University of the Assumption</h1>
            <h2>College of Information Technology Office Feedback Survey Backend</h2>
        </div>
    </div>

    <div class="gateway-card">
        <div class="logo-placeholder">🛡️</div>
        <h3>Secure API Engine</h3>
        <p>This is the encrypted backend engine for the College of Information Technology Office Feedback Survey System.</p>

        <a href="/admin.html" class="btn-portal">Access Admin Portal</a>
    </div>

</body>
</html>
