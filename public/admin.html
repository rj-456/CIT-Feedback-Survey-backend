<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>UA-CIT Secure Admin Portal</title>
    <style>
        /* Premium UA & CIT Color Palette */
        :root {
            --ua-blue: #004785;         
            --ua-blue-hover: #003366;   
            --cit-grey: #8a9aa9;        
            --cit-grey-light: #e2e8f0;  
            --bg-color: #f4f7f9;        
            --card-bg: #ffffff;         
            --cipher-bg: #111827;       
            --cipher-text: #38bdf8;     
            --danger: #ef4444;          
            --danger-hover: #dc2626;
            --warning-gold: #eab308;    
        }

        body { 
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif; 
            padding: 40px 20px; 
            max-width: 950px; 
            margin: auto; 
            background-color: var(--bg-color); 
            color: #334155; 
            line-height: 1.6;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--cit-grey);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95em;
            margin-bottom: 20px;
            transition: color 0.2s ease, transform 0.2s ease;
        }
        .back-link:hover {
            color: var(--ua-blue);
            transform: translateX(-3px); 
        }

        .portal-header {
            display: flex;
            align-items: center;      
            justify-content: center;  
            gap: 25px;                
            margin-bottom: 30px; 
            padding-bottom: 25px; 
            border-bottom: 1px solid var(--cit-grey-light);
        }
        
        .header-titles { text-align: left; }

        .portal-header h1 { 
            color: var(--ua-blue); 
            margin: 0 0 4px 0; 
            font-size: 2.2em; 
            font-weight: 800;
            letter-spacing: -0.5px;
        }
        
        .portal-header h2 { 
            color: var(--cit-grey); 
            margin: 0; 
            font-size: 1.15em; 
            font-weight: 500; 
        }

        .ua-logo {
            width: 105px;            
            height: auto;
            margin: 0;            
            border-radius: 50%; 
            mix-blend-mode: multiply; 
            filter: drop-shadow(0 4px 8px rgba(0, 71, 133, 0.1)); 
            flex-shrink: 0;           
        }

        #loginSection { 
            background: var(--card-bg); 
            padding: 40px; 
            border-radius: 12px; 
            text-align: center; 
            margin-top: 30px; 
            box-shadow: 0 10px 30px rgba(0, 71, 133, 0.08); 
            border-top: 6px solid var(--ua-blue); 
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }

        .dashboard-header {
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 30px;
        }
        .dashboard-header h3 {
            color: var(--ua-blue); 
            margin: 0; 
            font-size: 1.5em;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card { 
            background: var(--card-bg); 
            border-left: 8px solid var(--ua-blue); 
            padding: 30px; 
            margin-bottom: 30px; 
            border-radius: 12px; 
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
        }

        .timestamp {
            font-size: 0.85em;
            color: var(--cit-grey);
            font-weight: 500;
            margin-bottom: 12px;
            display: block;
            border-bottom: 1px solid var(--cit-grey-light);
            padding-bottom: 5px;
        }

        input { 
            padding: 14px 16px; 
            margin: 10px 0; 
            width: 100%; 
            box-sizing: border-box; 
            border-radius: 8px; 
            border: 1px solid var(--cit-grey-light); 
            background: #f8fafc; 
            color: #334155; 
        }

        button { 
            padding: 10px 20px; 
            border-radius: 8px; 
            border: none; 
            cursor: pointer; 
            font-weight: 600; 
            transition: all 0.2s ease; 
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary { background: var(--ua-blue); color: var(--card-bg); }
        .btn-danger { background: var(--danger); color: var(--card-bg); }
        .btn-secondary { background: var(--cit-grey); color: var(--card-bg); }

        .cipher { 
            font-family: 'Courier New', Consolas, monospace; 
            color: #475569; 
            background: #f8fafc; 
            border: 1px dashed var(--cit-grey); 
        }
        .cipher-pill { padding: 6px 16px; border-radius: 20px; font-size: 0.9em; display: inline-block; }
        .cipher-block { display: block; padding: 16px; border-radius: 8px; }

        .decrypted-inline { color: var(--ua-blue); font-weight: 700; border-bottom: 2px solid var(--cit-grey-light); display: inline-block; }
        .decrypted-block { background: #f8fafc; color: #334155; padding: 18px 20px; border-radius: 0 8px 8px 0; border-left: 4px solid var(--ua-blue); }

        .data-row { display: flex; align-items: center; gap: 15px; margin-bottom: 18px; flex-wrap: wrap; }
        .label-strong { color: var(--ua-blue); font-weight: 700; min-width: 180px; }
        .action-bar { display: flex; gap: 15px; border-top: 1px solid var(--cit-grey-light); padding-top: 20px; }
    </style>
</head>
<body>

    <a href="/" class="back-link" id="gatewayBtn"><span>←</span> Back to Gateway</a>

    <div class="portal-header">
        <img src="ua-logo.png" alt="Logo" class="ua-logo">
        <div class="header-titles">
            <h1>University of the Assumption</h1>
            <h2>College of Information Technology Office Feedback Survey</h2>
        </div>
    </div>

    <div id="loginSection">
        <h2 style="margin-bottom: 25px;">🛡️ Secure Admin Portal</h2>
        <input type="text" id="user" placeholder="Admin Username">
        <input type="password" id="pass" placeholder="Password">
        <button class="btn-primary" onclick="login()" style="width: 100%; margin-top: 20px; padding: 14px;">Authenticate Login</button>
    </div>

    <div id="dashboard" style="display:none;">
        <div class="dashboard-header">
            <h3>🔐 Encrypted Feedback Vault</h3>
            <button class="btn-danger" onclick="localStorage.clear(); location.reload();" style="padding: 12px 24px;">Log Out</button>
        </div>
        <div id="list"></div>
    </div>

    <script>
        const cipherStorage = {};

        if (localStorage.getItem('adminToken')) show();

        async function login() {
            const res = await fetch('/api/admin/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username: user.value, password: pass.value})
            });
            const data = await res.json();
            if (data.token) { 
                localStorage.setItem('adminToken', data.token); 
                show(); 
            } else { alert("Invalid Credentials"); }
        }

        async function show() {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            document.getElementById('gatewayBtn').style.display = 'none';
            
            const res = await fetch('/api/admin/feedbacks', { 
                headers: {'Authorization': localStorage.getItem('adminToken')} 
            });
            const feedbacks = await res.json();
            
            const list = document.getElementById('list');
            list.innerHTML = feedbacks.map(f => {
                const submissionDate = new Date(f.date).toLocaleString('en-US', {
                    month: 'long', day: 'numeric', year: 'numeric', hour: 'numeric', minute: '2-digit', hour12: true
                });

                return `
                <div class="card" id="card-${f.id}">
                    <span class="timestamp">📅 Submitted: ${submissionDate}</span>

                    <div class="data-row">
                        <span class="label-strong">🔐 Name / Classification:</span> 
                        <span class="cipher cipher-pill" id="name-${f.id}">${f.encName}</span>
                        <span class="cipher cipher-pill" id="classification-${f.id}">${f.encClassification}</span>
                    </div>

                    <div class="data-row">
                        <span class="label-strong">🔐 Email Address:</span> 
                        <span class="cipher cipher-pill" id="email-${f.id}">${f.encEmail}</span>
                    </div>
                    
                    <div class="data-row">
                        <span class="label-strong">🔐 Rating:</span> 
                        <span class="cipher cipher-pill" id="rate-${f.id}">${f.encRating}</span>
                    </div>
                    
                    <div class="data-row" style="margin-bottom: 5px;"><span class="label-strong">🔐 Message:</span></div>
                    <div style="margin-bottom: 25px; margin-top: 10px;">
                        <div class="cipher cipher-block" id="msg-container-${f.id}"><span id="msg-${f.id}">${f.encMsg}</span></div>
                    </div>

                    <div class="action-bar">
                        <button class="btn-primary" onclick="decryptItem('${f.id}')" id="btn-${f.id}">🔓 Decrypt Data</button>
                        <button class="btn-danger" onclick="del('${f.id}')">🗑️ Delete Record</button>
                    </div>
                </div>`;
            }).join('');
        }

        async function decryptItem(id) {
            const token = localStorage.getItem('adminToken');
            const btn = document.getElementById(`btn-${id}`);
            
            cipherStorage[id] = {
                name: document.getElementById(`name-${id}`).innerText,
                classification: document.getElementById(`classification-${id}`).innerText,
                email: document.getElementById(`email-${id}`).innerText, 
                rating: document.getElementById(`rate-${id}`).innerText,
                msg: document.getElementById(`msg-${id}`).innerText
            };

            try {
                const res = await fetch(`/api/admin/decrypt/${id}`, { 
                    method: 'POST', 
                    headers: {'Authorization': token} 
                });
                const d = await res.json();

                document.getElementById(`name-${id}`).innerText = d.name;
                document.getElementById(`name-${id}`).className = 'decrypted-inline';
                document.getElementById(`classification-${id}`).innerText = d.classification;
                document.getElementById(`classification-${id}`).className = 'decrypted-inline';
                document.getElementById(`email-${id}`).innerText = d.email;
                document.getElementById(`email-${id}`).className = 'decrypted-inline';

                const rateEl = document.getElementById(`rate-${id}`);
                rateEl.innerText = '★'.repeat(d.rating);
                rateEl.className = 'decrypted-inline';
                rateEl.style.color = 'var(--warning-gold)';
                rateEl.style.borderBottom = 'none';
                
                const msgContainer = document.getElementById(`msg-container-${id}`);
                msgContainer.className = 'decrypted-block';
                document.getElementById(`msg-${id}`).innerText = d.message;

                btn.innerText = "🔒 Encrypt Back";
                btn.className = "btn-secondary";
                btn.onclick = () => encryptBack(id);
            } catch (error) { alert("Decryption failed."); }
        }

        function encryptBack(id) {
            const btn = document.getElementById(`btn-${id}`);
            const data = cipherStorage[id];

            const nameEl = document.getElementById(`name-${id}`);
            nameEl.innerText = data.name; nameEl.className = 'cipher cipher-pill';

            const classEl = document.getElementById(`classification-${id}`);
            classEl.innerText = data.classification; classEl.className = 'cipher cipher-pill';

            const emailEl = document.getElementById(`email-${id}`);
            emailEl.innerText = data.email; emailEl.className = 'cipher cipher-pill';

            const rateEl = document.getElementById(`rate-${id}`);
            rateEl.innerText = data.rating; rateEl.className = 'cipher cipher-pill';
            rateEl.style.color = ''; rateEl.style.borderBottom = '';
            
            const msgContainer = document.getElementById(`msg-container-${id}`);
            msgContainer.className = 'cipher cipher-block'; 
            document.getElementById(`msg-${id}`).innerText = data.msg;

            btn.innerText = "🔓 Decrypt Data";
            btn.className = "btn-primary";
            btn.onclick = () => decryptItem(id);
        }

        async function del(id) {
            if (!confirm("Are you sure?")) return;
            const res = await fetch(`/api/admin/feedback/${id}`, { 
                method: 'DELETE', 
                headers: {'Authorization': localStorage.getItem('adminToken')} 
            });
            if (res.ok) document.getElementById(`card-${id}`).remove();
        }
    </script>
</body>
</html>
