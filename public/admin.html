<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>UA-CIT Secure Admin Portal</title>
    <style>
        /* Premium UA & CIT Color Palette */
        :root {
            --ua-blue: #003b6f;         
            --ua-blue-hover: #0056a3;   
            --cit-grey: #64748b;        
            --bg-color: #f0f4f8;        
            --card-bg: #ffffff;
            --cipher-bg: #0f172a;       
            --cipher-text: #38bdf8;     
            --decrypted-bg: #f0f9ff;    
            --decrypted-text: #0c4a6e;  
            --danger: #ef4444;          
            --danger-hover: #dc2626;
        }

        body { 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            padding: 20px; 
            max-width: 900px; 
            margin: auto; 
            background-color: var(--bg-color); 
            color: #334155; 
            line-height: 1.5;
        }

        /* NEW: Back Link Styling */
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--cit-grey);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95em;
            margin-bottom: 10px;
            transition: color 0.2s ease, transform 0.2s ease;
        }
        .back-link:hover {
            color: var(--ua-blue);
            transform: translateX(-3px); /* Small slide effect */
        }

        /* Header Styling */
        .portal-header {
            text-align: center;
            margin-bottom: 40px;
            padding-bottom: 15px;
            border-bottom: 2px solid #e2e8f0;
        }
        .portal-header h1 { 
            color: var(--ua-blue); 
            margin: 0; 
            font-size: 2em; 
            font-weight: 800;
            letter-spacing: -0.5px;
        }
        .portal-header h2 { 
            color: var(--cit-grey); 
            margin: 5px 0 0 0; 
            font-size: 1.2em; 
            font-weight: 500; 
        }

        /* Login Section */
        #loginSection { 
            background: var(--card-bg); 
            padding: 40px; 
            border-radius: 12px; 
            text-align: center; 
            margin-top: 40px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
            border-top: 6px solid var(--ua-blue); 
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }
        #loginSection h2 { margin-top: 0; color: var(--ua-blue); }

        /* Dashboard Cards */
        .card { 
            background: var(--card-bg); 
            border-left: 6px solid var(--ua-blue); 
            padding: 25px; 
            margin-bottom: 25px; 
            border-radius: 10px; 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .card:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.08), 0 4px 6px -2px rgba(0, 0, 0, 0.04);
        }

        /* Inputs & Buttons */
        input { 
            padding: 12px 15px; 
            margin: 10px 0; 
            width: 100%; 
            box-sizing: border-box; 
            border-radius: 8px; 
            border: 1px solid #cbd5e1; 
            background: #f8fafc; 
            color: #334155; 
            font-size: 1em;
            transition: all 0.2s;
        }
        input:focus { 
            outline: none; 
            border-color: var(--ua-blue); 
            box-shadow: 0 0 0 3px rgba(0,59,111,0.1); 
            background: #fff;
        }

        button { 
            padding: 10px 20px; 
            border-radius: 6px; 
            border: none; 
            cursor: pointer; 
            font-weight: 600; 
            font-size: 0.95em;
            transition: background 0.2s, transform 0.1s; 
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        button:active { transform: scale(0.97); }

        .btn-primary { background: var(--ua-blue); color: #fff; }
        .btn-primary:hover { background: var(--ua-blue-hover); }
        
        .btn-danger { background: var(--danger); color: #fff; }
        .btn-danger:hover { background: var(--danger-hover); }

        .btn-secondary { background: var(--cit-grey); color: #fff; }
        .btn-secondary:hover { background: #475569; }

        /* Secure Data Badges (Ciphertext) */
        .cipher { 
            font-family: 'Courier New', Consolas, monospace; 
            color: var(--cipher-text); 
            background: var(--cipher-bg); 
            padding: 6px 12px; 
            border-radius: 6px; 
            word-break: break-all; 
            font-size: 0.85em; 
            display: inline-block;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
            letter-spacing: 0.5px;
        }

        /* Revealed Decrypted Text */
        .decrypted { 
            background: var(--decrypted-bg); 
            color: var(--decrypted-text); 
            padding: 15px 20px; 
            border-radius: 8px; 
            margin-top: 10px; 
            border-left: 4px solid var(--ua-blue); 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            font-weight: 500;
        }
        
        .data-row {
            display: flex;
            align-items: baseline;
            gap: 10px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        .label-strong { 
            color: var(--ua-blue); 
            font-weight: 700; 
            min-width: 160px;
        }
    </style>
</head>
<body>
    
    <a href="/" class="back-link">
        <span>←</span> Back to Gateway
    </a>

    <div class="portal-header">
        <h1>University of the Assumption</h1>
        <h2>College of Information Technology Office Feedback Survey Backend</h2>
    </div>

    <div id="loginSection">
        <h2 style="margin-bottom: 25px;">🛡️ Secure Admin Portal</h2>
        <input type="text" id="user" placeholder="Admin Username">
        <input type="password" id="pass" placeholder="Password">
        <button class="btn-primary" onclick="login()" style="width: 100%; justify-content: center; margin-top: 20px; padding: 12px; font-size: 1.1em;">Authenticate Session</button>
    </div>

    <div id="dashboard" style="display:none;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
            <h3 style="color: var(--ua-blue); margin: 0; font-size: 1.4em;">🔐 Encrypted Feedback Vault</h3>
            <button class="btn-danger" onclick="localStorage.clear(); location.reload();">Log Out</button>
        </div>
        <div id="list"></div>
    </div>

    <script>
        const cipherStorage = {};

        if (localStorage.getItem('adminToken')) show();

        async function login() {
            const res = await fetch('/api/admin/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username: user.value, password: pass.value})
            });
            const data = await res.json();
            if (data.token) { 
                localStorage.setItem('adminToken', data.token); 
                show(); 
            } else {
                alert("Invalid Credentials");
            }
        }

        async function show() {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            
            const res = await fetch('/api/admin/feedbacks', { 
                headers: {'Authorization': localStorage.getItem('adminToken')} 
            });
            const feedbacks = await res.json();
            
            const list = document.getElementById('list');
            list.innerHTML = feedbacks.map(f => `
                <div class="card" id="card-${f.id}">
                    <div class="data-row">
                        <span class="label-strong">🔒 Name / Class:</span> 
                        <span class="cipher" id="name-${f.id}">${f.encName}</span>
                        <span class="cipher" id="classification-${f.id}">${f.encClassification}</span>
                    </div>
                    
                    <div class="data-row">
                        <span class="label-strong">🔒 Rating:</span> 
                        <span class="cipher" id="rate-${f.id}">${f.encRating}</span>
                    </div>
                    
                    <div class="data-row" style="margin-top: 15px;">
                        <span class="label-strong">🔒 Message:</span>
                    </div>
                    <div style="margin-bottom: 20px;">
                        <div class="cipher" id="msg-container-${f.id}" style="display: block; padding: 12px;">
                            <span id="msg-${f.id}">${f.encMsg}</span>
                        </div>
                    </div>

                    <div style="display: flex; gap: 12px; border-top: 1px solid #f1f5f9; padding-top: 15px;">
                        <button class="btn-primary" onclick="decryptItem('${f.id}')" id="btn-${f.id}">🔓 Decrypt Data</button>
                        <button class="btn-danger" onclick="del('${f.id}')">🗑️ Delete Record</button>
                    </div>
                </div>
            `).join('');
        }

        async function decryptItem(id) {
            const token = localStorage.getItem('adminToken');
            const btn = document.getElementById(`btn-${id}`);
            
            cipherStorage[id] = {
                name: document.getElementById(`name-${id}`).innerText,
                classification: document.getElementById(`classification-${id}`).innerText,
                rating: document.getElementById(`rate-${id}`).innerText,
                msg: document.getElementById(`msg-${id}`).innerText
            };

            try {
                const res = await fetch(`/api/admin/decrypt/${id}`, { 
                    method: 'POST', 
                    headers: {'Authorization': token} 
                });
                const d = await res.json();

                document.getElementById(`name-${id}`).innerText = d.name;
                document.getElementById(`name-${id}`).className = 'decrypted';
                document.getElementById(`name-${id}`).style.display = 'inline-block';
                document.getElementById(`name-${id}`).style.padding = '4px 12px';
                document.getElementById(`name-${id}`).style.marginTop = '0';

                document.getElementById(`classification-${id}`).innerText = d.classification;
                document.getElementById(`classification-${id}`).className = 'decrypted';
                document.getElementById(`classification-${id}`).style.display = 'inline-block';
                document.getElementById(`classification-${id}`).style.padding = '4px 12px';
                document.getElementById(`classification-${id}`).style.marginTop = '0';

                document.getElementById(`rate-${id}`).innerText = '★'.repeat(d.rating);
                document.getElementById(`rate-${id}`).className = 'decrypted';
                document.getElementById(`rate-${id}`).style.display = 'inline-block';
                document.getElementById(`rate-${id}`).style.padding = '4px 12px';
                document.getElementById(`rate-${id}`).style.marginTop = '0';
                
                const msgSpan = document.getElementById(`msg-${id}`);
                const msgContainer = document.getElementById(`msg-container-${id}`);
                msgContainer.className = 'decrypted';
                msgContainer.style.boxShadow = 'none';
                msgSpan.innerText = d.message;

                btn.innerText = "🔒 Encrypt Back";
                btn.className = "btn-secondary";
                btn.onclick = () => encryptBack(id);
            } catch (error) {
                alert("Decryption failed.");
            }
        }

        function encryptBack(id) {
            const btn = document.getElementById(`btn-${id}`);
            const data = cipherStorage[id];

            const nameEl = document.getElementById(`name-${id}`);
            nameEl.innerText = data.name;
            nameEl.className = 'cipher';
            nameEl.style = '';

            const classEl = document.getElementById(`classification-${id}`);
            classEl.innerText = data.classification;
            classEl.className = 'cipher';
            classEl.style = '';

            const rateEl = document.getElementById(`rate-${id}`);
            rateEl.innerText = data.rating;
            rateEl.className = 'cipher';
            rateEl.style = '';
            
            const msgSpan = document.getElementById(`msg-${id}`);
            const msgContainer = document.getElementById(`msg-container-${id}`);
            msgContainer.className = 'cipher'; 
            msgContainer.style.display = 'block';
            msgContainer.style.padding = '12px';
            msgSpan.innerText = data.msg;

            btn.innerText = "🔓 Decrypt Data";
            btn.className = "btn-primary";
            btn.onclick = () => decryptItem(id);
        }

        async function del(id) {
            if (!confirm("Are you sure you want to permanently delete this record?")) return;
            const res = await fetch(`/api/admin/feedback/${id}`, { 
                method: 'DELETE', 
                headers: {'Authorization': localStorage.getItem('adminToken')} 
            });
            if (res.ok) document.getElementById(`card-${id}`).remove();
        }
    </script>
</body>
</html>
